name: Daily Morning Briefing

on:
  schedule:
    # 3:00 AM UTC = 8:00 AM PKT (UTC+5)
    - cron: '0 3 * * *'
  # Also allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  send-briefing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install
        working-directory: ./

      - name: Run daily briefing
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY:            ${{ secrets.RESEND_API_KEY }}
          RECIPIENT_EMAILS:          ${{ secrets.RECIPIENT_EMAILS }}
          WHATSAPP_PHONE:            ${{ secrets.WHATSAPP_PHONE }}
          CALLMEBOT_APIKEY:          ${{ secrets.CALLMEBOT_APIKEY }}
        run: node scripts/daily-briefing.mjs
